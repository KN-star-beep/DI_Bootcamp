<!DOCTYPE html>
<html>
<head>
    <title>Sweet Cookies Shop</title>
    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#fff8f0;
        }

        /* Navigation bar */
        nav{
            background:#8B4513;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 20px;
            font-size:18px;
        }

        /* Header */
        header{
            text-align:center;
            padding:40px;
            background:#f4c27a;
        }

        /* Cookie products */
        .cookies{
            display:flex;
            justify-content:center;
            gap:30px;
            padding:40px;
        }

        .cookie{
            background:white;
            border-radius:10px;
            padding:20px;
            width:200px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        button{
            background:#8B4513;
            color:white;
            border:none;
            padding:10px 15px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#a0522d;
        }
    </style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<header>
    <h1>Sweet Cookies Shop</h1>
    <p>Freshly baked cookies delivered to you!</p>
</header>

<section class="cookies">

    <div class="cookie">
        <h3>Chocolate Chip</h3>
        <p>$3.00</p>
        <button>Buy Now</button>
    </div>

    <div class="cookie">
        <h3>Oatmeal Cookie</h3>
        <p>$2.50</p>
        <button>Buy Now</button>
    </div>

    <div class="cookie">
        <h3>Peanut Butter</h3>
        <p>$3.50</p>
        <button>Buy Now</button>
    </div>

</section>

</body>
</html>
